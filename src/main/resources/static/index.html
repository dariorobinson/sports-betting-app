<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Kalshi Sports Betting</title>
<style>
  :root { color-scheme: light dark; }
  body { font-family: -apple-system, Segoe UI, Arial, sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
  h1 { font-size: 1.4rem; }
  h2 { font-size: 1.1rem; margin-top: 2rem; }
  .row { display: flex; gap: 1rem; flex-wrap: wrap; }
  .card { border: 1px solid #8884; border-radius: 8px; padding: 0.75rem 1rem; margin: 0.4rem 0; cursor: pointer; }
  .card:hover { border-color: #08f; }
  .market { border: 1px solid #8884; border-radius: 8px; padding: 0.6rem 0.9rem; margin: 0.4rem 0; }
  button { cursor: pointer; padding: 0.4rem 0.8rem; border-radius: 6px; border: 1px solid #8886; background: #0a84ff; color: white; }
  button.secondary { background: transparent; color: inherit; }
  input, select { padding: 0.3rem; border-radius: 4px; border: 1px solid #8886; }
  .price-btn { margin: 0.2rem; }
  .muted { opacity: 0.65; font-size: 0.9rem; }
  #status { white-space: pre-wrap; background: #8882; padding: 0.6rem; border-radius: 6px; margin-top: 1rem; display: none; }
  a.back { cursor: pointer; }
</style>
</head>
<body>
<h1>🏈 Kalshi Sports Betting</h1>
<div class="muted">Browse sports, view games, and place bets on Kalshi event markets.</div>

<div class="row" style="justify-content: space-between; align-items: center;">
  <div id="breadcrumbs"></div>
  <div>
    <button class="secondary" onclick="loadPortfolio()">Balance &amp; positions</button>
  </div>
</div>

<div id="portfolio" style="display:none"></div>
<div id="content"></div>
<pre id="status"></pre>

<script>
// If the server has APP_API_KEY set, requests to /api/** (besides /api/status) need this header.
// Only asked for on first 401 — most local/loopback deployments won't have a key set at all.
function apiKeyHeaders() {
  const key = localStorage.getItem('appApiKey');
  return key ? { 'X-App-Api-Key': key } : {};
}

const api = (path, opts) => fetch(path, { ...opts, headers: { ...(opts && opts.headers), ...apiKeyHeaders() } })
  .then(async r => {
    if (r.status === 401) {
      const key = prompt('This server requires an API key (X-App-Api-Key). Enter it:');
      if (key) {
        localStorage.setItem('appApiKey', key);
        return api(path, opts); // retry once with the new key
      }
    }
    const body = await r.json().catch(() => null);
    if (!r.ok) throw body || { error: 'request_failed', status: r.status };
    return body;
  });

function showStatus(obj) {
  const el = document.getElementById('status');
  el.style.display = 'block';
  el.textContent = typeof obj === 'string' ? obj : JSON.stringify(obj, null, 2);
}

function crumbs(items) {
  document.getElementById('breadcrumbs').innerHTML = items
    .map((it, i) => i === items.length - 1 ? `<b>${it.label}</b>` : `<a class="back" onclick="${it.action}">${it.label}</a> &rsaquo; `)
    .join('');
}

async function loadSports() {
  crumbs([{ label: 'Sports', action: 'loadSports()' }]);
  const sports = await api('/api/sports');
  const el = document.getElementById('content');
  if (!sports.length) { el.innerHTML = '<p class="muted">No sports series found.</p>'; return; }
  el.innerHTML = '<div class="row">' + sports.map(s =>
    `<div class="card" onclick="loadGames('${s.series_ticker}','${(s.title||'').replace(/'/g, "\\'")}')">
       <b>${s.title}</b><div class="muted">${s.series_ticker} · ${s.frequency||''}</div>
     </div>`).join('') + '</div>';
}

async function loadGames(seriesTicker, title) {
  crumbs([{ label: 'Sports', action: 'loadSports()' }, { label: title || seriesTicker, action: `loadGames('${seriesTicker}','${title}')` }]);
  const games = await api(`/api/sports/${encodeURIComponent(seriesTicker)}/games`);
  const el = document.getElementById('content');
  if (!games.length) { el.innerHTML = '<p class="muted">No open games right now.</p>'; return; }
  el.innerHTML = games.map(g =>
    `<div class="card" onclick="loadGame('${g.event_ticker}')">
       <b>${g.title}</b><div class="muted">${g.sub_title || ''} ${g.strike_date ? '· ' + new Date(g.strike_date).toLocaleString() : ''}</div>
     </div>`).join('');
}

async function loadGame(eventTicker) {
  const g = await api(`/api/sports/games/${encodeURIComponent(eventTicker)}`);
  crumbs([{ label: 'Sports', action: 'loadSports()' }, { label: g.series_ticker, action: `loadGames('${g.series_ticker}','')` }, { label: g.title, action: `loadGame('${eventTicker}')` }]);
  const el = document.getElementById('content');
  el.innerHTML = `<h2>${g.title}</h2><div class="muted">${g.sub_title||''}</div>` +
    g.markets.map(m => `
      <div class="market">
        <div>Will <b>${m.yes_label}</b> win?</div>
        <div class="muted">status: ${m.status} · last: ${m.last_price_dollars ?? '-'}</div>
        <div class="row">
          <button class="price-btn" onclick="openBetForm('${m.ticker}','YES','${m.yes_ask_dollars}')">Buy YES (wins) @ ${m.yes_ask_dollars ?? '?'}</button>
          <button class="price-btn" onclick="openBetForm('${m.ticker}','NO','${m.no_ask_dollars}')">Buy NO (loses) @ ${m.no_ask_dollars ?? '?'}</button>
          <button class="price-btn secondary" onclick="viewOrderbook('${m.ticker}')">Orderbook</button>
        </div>
        <div id="bet-form-${m.ticker}"></div>
        <div id="orderbook-${m.ticker}"></div>
      </div>`).join('');
}

function openBetForm(ticker, outcome, price) {
  const el = document.getElementById(`bet-form-${ticker}`);
  el.innerHTML = `
    <div class="row" style="align-items:center; margin-top:0.4rem;">
      <span>Outcome: <b>${outcome}</b></span>
      <label>Price $ <input id="price-${ticker}" type="number" step="0.01" min="0.01" max="0.99" value="${price || '0.50'}" style="width:5rem"></label>
      <label>Contracts <input id="count-${ticker}" type="number" min="1" value="1" style="width:4rem"></label>
      <button onclick="submitBet('${ticker}','${outcome}')">Place bet</button>
    </div>`;
}

async function submitBet(ticker, outcome) {
  const price = parseFloat(document.getElementById(`price-${ticker}`).value);
  const count = parseInt(document.getElementById(`count-${ticker}`).value, 10);
  try {
    const result = await api('/api/bets', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ ticker, outcome, action: 'BUY', price, count })
    });
    showStatus(result);
  } catch (e) {
    showStatus(e);
  }
}

async function viewOrderbook(ticker) {
  const el = document.getElementById(`orderbook-${ticker}`);
  try {
    const ob = await api(`/api/sports/markets/${encodeURIComponent(ticker)}/orderbook`);
    const fmt = levels => levels.length
      ? levels.map(l => `${l.price_dollars} × ${l.contracts}`).join('<br>')
      : '<span class="muted">none</span>';
    el.innerHTML = `<div class="row" style="margin-top:0.4rem;">
      <div><b>Yes bids</b><br>${fmt(ob.yes_bids)}</div>
      <div><b>No bids</b><br>${fmt(ob.no_bids)}</div>
    </div>`;
  } catch (e) {
    showStatus(e);
  }
}

async function loadPortfolio() {
  const el = document.getElementById('portfolio');
  el.style.display = 'block';
  try {
    const [balance, positions] = await Promise.all([
      api('/api/portfolio/balance'),
      api('/api/portfolio/positions')
    ]);
    el.innerHTML = `<h2>Portfolio</h2>
      <div>Balance: <b>$${balance.balance_dollars}</b> · Portfolio value: $${(balance.portfolio_value/100).toFixed(2)}</div>
      <div class="muted">${positions.market_positions.length} open market position(s)</div>
      ${positions.market_positions.map(p => `<div class="market">${p.ticker}: ${p.position_fp} contracts · exposure $${p.market_exposure_dollars}</div>`).join('')}`;
  } catch (e) {
    el.innerHTML = '';
    showStatus(e);
  }
}

loadSports().catch(showStatus);
</script>
</body>
</html>
